name: linter

on:
  push:
    branches:
      - develop
      - main
  pull_request:
    branches:
      - develop
      - main

permissions:
  contents: write

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: CI Setup
        run: ./devtools/setup/ci.sh --npm

      - name: Lint PHP (PHPStan)
        run: ./devtools/lint/php.sh

      - name: Lint Frontend (ESLint)
        run: ./devtools/lint/js.sh

      - name: Dead Code Detection (Knip)
        run: ./devtools/lint/deadcode.sh
